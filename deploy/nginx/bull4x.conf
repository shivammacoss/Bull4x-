map $http_upgrade $connection_upgrade { default upgrade; '' close; }

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name bull4x.com www.bull4x.com admin.bull4x.com api.bull4x.com;
    return 301 https://$host$request_uri;
}

# ── Trader → bull4x.com ──
server {
    listen 443 ssl;
    http2 on;
    server_name bull4x.com www.bull4x.com;
    ssl_certificate     /etc/ssl/cloudflare/bull4x.pem;
    ssl_certificate_key /etc/ssl/cloudflare/bull4x.key;
    client_max_body_size 15m;
    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ── Admin → admin.bull4x.com ──
server {
    listen 443 ssl;
    http2 on;
    server_name admin.bull4x.com;
    ssl_certificate     /etc/ssl/cloudflare/bull4x.pem;
    ssl_certificate_key /etc/ssl/cloudflare/bull4x.key;
    client_max_body_size 15m;
    location / {
        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ── Gateway API + WebSocket → api.bull4x.com ──
server {
    listen 443 ssl;
    http2 on;
    server_name api.bull4x.com;
    ssl_certificate     /etc/ssl/cloudflare/bull4x.pem;
    ssl_certificate_key /etc/ssl/cloudflare/bull4x.key;
    client_max_body_size 15m;
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
    }
}
